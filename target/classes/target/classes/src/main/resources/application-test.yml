spring:
  datasource:
    url: jdbc:h2:mem:workoutdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  security:
    jwt:
      secret: test-secret-should-be-overridden-in-real-environments
      access-token-expiration-minutes: 30

